services:
  postgres:
    image: postgres:16-alpine
    container_name: korp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - korp_postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  inventoryservice:
    build:
      context: ./backend/InventoryService
      dockerfile: Dockerfile
    container_name: korp_inventory
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__InventoryDb=Host=postgres;Port=5432;Database=inventory_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  billingservice:
    build:
      context: ./backend/BillingService
      dockerfile: Dockerfile
    container_name: korp_billing
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__BillingDb=Host=postgres;Port=5432;Database=billing_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Services__InventoryServiceUrl=http://inventoryservice:5001
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy

  apigateway:
    build:
      context: ./backend/ApiGateway
      dockerfile: Dockerfile
    container_name: korp_apigateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Services__InventoryServiceUrl=http://inventoryservice:5001
      - Services__BillingServiceUrl=http://billingservice:5002
    ports:
      - "5000:5000"
    depends_on:
      - inventoryservice
      - billingservice

volumes:
  korp_postgres_data:
    driver: local
